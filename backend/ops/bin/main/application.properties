spring.application.name=cymelle-ops

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cymelle_db
spring.datasource.username=postgres
spring.datasource.password=vick3900
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history

# Logging
logging.level.root=INFO
logging.level.com.cymelle=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Inventory Configuration
inventory.low-stock-threshold=5

# Fare Configuration
fare.base-fare=50.00
fare.rate-per-km=10.00
fare.minimum-fare=100.00
fare.default-surge-multiplier=1.0
